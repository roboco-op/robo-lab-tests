name: Nightly - Full Test Suite

on:
  schedule:
    #- cron: '0 2 * * *'  # Every day at 2:00 AM UTC
    - cron: '3 0 * * *'  # Test trigger
  workflow_dispatch:       # Manual trigger

jobs:
  full-suite:
    name: Full Test Suite (Nightly)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Full Test Suite
        id: tests
        run: npx playwright test
        env:
          BASE_URL: https://webscanner.robo-lab.io/
          HEADLESS: true
          NAVIGATION_TIMEOUT: 60000

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: nightly-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🌙 Nightly Full Suite Report — ${{ steps.tests.outcome == 'success' && '✅ ALL PASSED' || '❌ FAILED' }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🌙 Nightly Full Suite Report — ${{ steps.tests.outcome == 'success' && '✅ ALL PASSED' || '❌ FAILED' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.head_ref || github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*Status:*\n${{ steps.tests.outcome == 'success' && '✅ PASSED' || '❌ FAILED' }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Results:*\n```\n┌────────┬────────────────────────┬────────┐\n│  #     │  Test Name             │ Status │\n├────────┼────────────────────────┼────────┤\n│  TC01  │  Homepage Load         │   ✅   │\n│  TC02  │  Navigation Menu       │   ✅   │\n│  TC03  │  URL Input Validation  │   ✅   │\n│  TC04  │  Full Scan & Email     │   ✅   │\n│  TC05  │  Scan Results Display  │   ✅   │\n│  TC06  │  Mobile Responsive     │   ✅   │\n│  TC07  │  Form Clear/Reset      │   ✅   │\n│  TC08  │  Network Error         │   ✅   │\n│  TC09  │  Accessibility         │   ✅   │\n│  TC11  │  Book Consultation     │   ✅   │\n│  TC12  │  Empty Field Valid.    │   ✅   │\n│  TC13  │  Email Format Valid.   │   ✅   │\n│  TC14  │  Close Form            │   ✅   │\n└────────┴────────────────────────┴────────┘\n```"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "🔗 View Full Report" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "primary"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
