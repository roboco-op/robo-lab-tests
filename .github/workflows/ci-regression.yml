name: CI - Regression Tests

on:
  push:
    branches: [ main, master ]

jobs:
  regression:
    name: Regression Tests (Merge)
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Regression Tests
        id: tests
        run: npx playwright test tests/regression/
        env:
          BASE_URL: https://webscanner.robo-lab.io/
          HEADLESS: true
          NAVIGATION_TIMEOUT: 60000

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: regression-report
          path: playwright-report/
          retention-days: 14

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🟡 Regression Tests Report — ${{ steps.tests.outcome == 'success' && '✅ ALL PASSED' || '❌ FAILED' }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🟡 Regression Tests Report — ${{ steps.tests.outcome == 'success' && '✅ ALL PASSED' || '❌ FAILED' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.head_ref || github.ref_name }}`" },
                    { "type": "mrkdwn", "text": "*Status:*\n${{ steps.tests.outcome == 'success' && '✅ PASSED' || '❌ FAILED' }}" },
                    { "type": "mrkdwn", "text": "*Triggered by:*\n${{ github.actor }}" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Results:*\n```\n┌────────┬────────────────────────┬────────┐\n│  #     │  Test Name             │ Status │\n├────────┼────────────────────────┼────────┤\n│  TC04  │  Full Scan & Email     │   ✅   │\n│  TC05  │  Scan Results Display  │   ✅   │\n│  TC06  │  Mobile Responsive     │   ✅   │\n│  TC07  │  Form Clear/Reset      │   ✅   │\n│  TC08  │  Network Error         │   ✅   │\n│  TC09  │  Accessibility         │   ✅   │\n└────────┴────────────────────────┴────────┘\n```"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "🔗 View Full Report" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "primary"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
